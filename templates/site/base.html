<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Foods Delivery{% endblock %}</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    >
</head>

<body>

    <nav class="navbar is-primary">
        <div class="navbar-brand">
            <a class="navbar-item">
                <strong>Foods Delivery</strong>
            </a>
        </div>

        <div class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item" href="{{ url_for('site.index') }}">Home</a>
                <a class="navbar-item" href="{{ url_for('site.contato') }}">Contato</a>
                <a class="navbar-item" href="{{ url_for('site.sobre') }}">Sobre</a>
            </div>
        </div>
    </nav>

    <section class="hero is-fullheight">
        <div class="hero-body">
          <div class="container has-text-centered">
            {% block content %}{% endblock %}
          </div>
        </div>
      </section>

    <footer class="footer">
        <div class="content has-text-centered">
            <p>&copy; 2026 - Delivery UVV</p>
        </div>
    </footer>

</body>
</html>
